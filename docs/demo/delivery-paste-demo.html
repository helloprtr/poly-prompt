<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prtr delivery demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #130d1f;
        --bg-2: #1d2942;
        --panel: rgba(8, 12, 25, 0.88);
        --panel-border: rgba(255, 207, 110, 0.22);
        --text: #f4f7ff;
        --muted: #a0aec4;
        --prompt: #9fd8ff;
        --ok: #7df1ae;
        --accent: #ffd36f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(255, 211, 111, 0.18), transparent 24%),
          radial-gradient(circle at 82% 16%, rgba(159, 216, 255, 0.18), transparent 25%),
          linear-gradient(140deg, var(--bg-1), var(--bg-2));
        color: var(--text);
        font-family: "SFMono-Regular", "JetBrains Mono", "Menlo", "Consolas", monospace;
      }

      .wrap {
        width: 1240px;
        max-width: calc(100vw - 48px);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: rgba(244, 247, 255, 0.76);
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .terminal {
        min-height: 700px;
        border-radius: 28px;
        border: 1px solid var(--panel-border);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0)),
          var(--panel);
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        overflow: hidden;
        backdrop-filter: blur(22px);
      }

      .chrome {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }

      .lights {
        display: flex;
        gap: 9px;
      }

      .light {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .light.red {
        background: #ff6b6b;
      }

      .light.yellow {
        background: #ffd166;
      }

      .light.green {
        background: #79f2a0;
      }

      .title {
        color: rgba(244, 247, 255, 0.88);
        font-size: 13px;
      }

      .badge {
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 211, 111, 0.12);
        color: var(--accent);
        font-size: 12px;
      }

      .screen {
        padding: 26px 30px 28px;
        font-size: 19px;
        line-height: 1.58;
        white-space: pre-wrap;
      }

      .line {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 240ms ease, transform 240ms ease;
      }

      .line.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .line.prompt {
        color: var(--prompt);
      }

      .line.ok {
        color: var(--ok);
      }

      .line.accent {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="eyebrow">Copy + Paste Delivery Demo</p>
      <section class="terminal">
        <div class="chrome">
          <div class="lights">
            <span class="light red"></span>
            <span class="light yellow"></span>
            <span class="light green"></span>
          </div>
          <div class="title">poly-prompt / launch and submit flow</div>
          <div class="badge">Clipboard -> Terminal.app -> confirm submit</div>
        </div>
        <div class="screen" id="screen"></div>
      </section>
    </div>

    <script>
      const scriptLines = [
        { text: 'koo@demo ~/poly-prompt % prtr --paste --submit confirm -t codex "이 변경의 핵심 리스크를 요약해줘"', kind: "prompt", delay: 320 },
        { text: 'copied prompt for target "codex" to clipboard', delay: 320, kind: "ok" },
        { text: "opened codex CLI session", delay: 320, kind: "ok" },
        { text: "pasted prompt into codex terminal session", delay: 340, kind: "ok" },
        { text: "Submit pasted prompt to codex now? [y/N]: y", delay: 560, kind: "accent" },
        { text: "submitted prompt to codex", delay: 340, kind: "ok" },
        { text: "", delay: 460 },
        { text: "// Target: codex", delay: 260, kind: "prompt" },
        { text: "Expert Backend Engineer & Tech Lead.", delay: 240 },
        { text: "Please summarize the main risks in this change.", delay: 320 },
        { text: "", delay: 700 },
        { text: "delivery_mode=open-copy-paste  pasted=true  submitted=true", delay: 300, kind: "accent" }
      ];

      const screen = document.getElementById("screen");
      let timers = [];

      function clearTimers() {
        for (const timer of timers) clearTimeout(timer);
        timers = [];
      }

      function appendLine(text, kind = "") {
        const line = document.createElement("div");
        line.className = "line" + (kind ? " " + kind : "");
        line.textContent = text;
        screen.appendChild(line);
        requestAnimationFrame(() => line.classList.add("visible"));
        screen.scrollTop = screen.scrollHeight;
      }

      function play() {
        clearTimers();
        screen.innerHTML = "";
        let totalDelay = 0;
        for (const item of scriptLines) {
          totalDelay += item.delay;
          timers.push(setTimeout(() => appendLine(item.text, item.kind || ""), totalDelay));
        }
      }

      window.routerDemo = {
        restart: play,
        durationMs: 6400,
      };

      play();
    </script>
  </body>
</html>
