<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prtr setup + doctor demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #07141e;
        --bg-2: #11293d;
        --panel: rgba(6, 15, 28, 0.88);
        --panel-border: rgba(147, 197, 253, 0.22);
        --text: #edf5ff;
        --muted: #8aa4bf;
        --prompt: #8bd3ff;
        --ok: #7df1ae;
        --warn: #ffcf6e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 14% 18%, rgba(125, 241, 174, 0.16), transparent 24%),
          radial-gradient(circle at 82% 16%, rgba(139, 211, 255, 0.16), transparent 26%),
          linear-gradient(140deg, var(--bg-1), var(--bg-2));
        color: var(--text);
        font-family: "SFMono-Regular", "JetBrains Mono", "Menlo", "Consolas", monospace;
      }

      .wrap {
        width: 1240px;
        max-width: calc(100vw - 48px);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: rgba(237, 245, 255, 0.75);
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .terminal {
        min-height: 700px;
        border-radius: 28px;
        border: 1px solid var(--panel-border);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0)),
          var(--panel);
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        overflow: hidden;
        backdrop-filter: blur(22px);
      }

      .chrome {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }

      .lights {
        display: flex;
        gap: 9px;
      }

      .light {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .light.red {
        background: #ff6b6b;
      }

      .light.yellow {
        background: #ffd166;
      }

      .light.green {
        background: #79f2a0;
      }

      .title {
        color: rgba(237, 245, 255, 0.88);
        font-size: 13px;
      }

      .badge {
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(125, 241, 174, 0.12);
        color: var(--ok);
        font-size: 12px;
      }

      .screen {
        padding: 26px 30px 28px;
        font-size: 18px;
        line-height: 1.58;
        white-space: pre-wrap;
      }

      .line {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .line.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .line.prompt {
        color: var(--prompt);
      }

      .line.ok {
        color: var(--ok);
      }

      .line.warn {
        color: var(--warn);
      }

      .line.muted {
        color: var(--muted);
      }

      .prompt-prefix {
        color: var(--prompt);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="eyebrow">Setup + Doctor Demo</p>
      <section class="terminal">
        <div class="chrome">
          <div class="lights">
            <span class="light red"></span>
            <span class="light yellow"></span>
            <span class="light green"></span>
          </div>
          <div class="title">poly-prompt / first-run walkthrough</div>
          <div class="badge">Configured without exposing the API key</div>
        </div>
        <div class="screen" id="screen"></div>
      </section>
    </div>

    <script>
      const scriptLines = [
        { text: "koo@demo ~/poly-prompt % prtr setup", kind: "prompt", delay: 320 },
        { text: "prtr setup", delay: 320 },
        { text: "Press Enter to keep the current value.", delay: 260, kind: "muted" },
        { text: "DeepL API key [configured]:", delay: 260 },
        { text: "Default input language (auto=automatic detection, ko=Korean, ja=Japanese, zh=Chinese, en=English, custom) [default: auto]:", delay: 240 },
        { text: "auto", delay: 220, kind: "muted" },
        { text: "Default output language (en=English, ja=Japanese, zh=Chinese, de=German, fr=French, custom) [default: en]:", delay: 240 },
        { text: "en", delay: 220, kind: "muted" },
        { text: "Default target (claude, codex, gemini) [default: codex]:", delay: 240 },
        { text: "codex", delay: 220, kind: "muted" },
        { text: "Default role (be, fe, review, writer, ui, se, pm, da, none) [default: be]:", delay: 240 },
        { text: "be", delay: 220, kind: "muted" },
        { text: "Default template preset (claude-review, claude-structured, codex-implement, codex-review, gemini-scalable, gemini-stepwise) [default: codex-implement]:", delay: 240 },
        { text: "codex-implement", delay: 280, kind: "muted" },
        { text: "saved config to ~/.config/prtr/config.toml", delay: 360, kind: "ok" },
        { text: "", delay: 480 },
        { text: "koo@demo ~/poly-prompt % prtr doctor", kind: "prompt", delay: 260 },
        { text: "OK   user config: ~/.config/prtr/config.toml", delay: 240, kind: "ok" },
        { text: "OK   deepl api key: configured", delay: 240, kind: "ok" },
        { text: "OK   translation", delay: 240, kind: "ok" },
        { text: "OK   clipboard", delay: 220, kind: "ok" },
        { text: "OK   targets", delay: 220, kind: "ok" },
        { text: "OK   template presets: 6 presets", delay: 220, kind: "ok" },
        { text: "OK   profiles: 4 profiles", delay: 220, kind: "ok" },
        { text: "OK   shortcuts: 4 shortcuts", delay: 220, kind: "ok" },
        { text: "OK   launcher codex: codex via Terminal.app", delay: 240, kind: "ok" },
        { text: "WARN automation codex: grant Accessibility permission to enable --paste", delay: 360, kind: "warn" }
      ];

      const screen = document.getElementById("screen");
      let timers = [];

      function clearTimers() {
        for (const timer of timers) clearTimeout(timer);
        timers = [];
      }

      function appendLine(text, kind = "") {
        const line = document.createElement("div");
        line.className = "line" + (kind ? " " + kind : "");
        line.textContent = text;
        screen.appendChild(line);
        requestAnimationFrame(() => line.classList.add("visible"));
        screen.scrollTop = screen.scrollHeight;
      }

      function play() {
        clearTimers();
        screen.innerHTML = "";
        let totalDelay = 0;
        for (const item of scriptLines) {
          totalDelay += item.delay;
          timers.push(setTimeout(() => appendLine(item.text, item.kind || ""), totalDelay));
        }
      }

      window.routerDemo = {
        restart: play,
        durationMs: 10500,
      };

      play();
    </script>
  </body>
</html>
