project_name: prtr

before:
  hooks:
    - go test ./...

builds:
  - id: prtr
    main: ./cmd/prtr
    binary: prtr
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: prtr
    builds:
      - prtr
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

release:
  github:
    owner: helloprtr
    name: poly-prompt

brews:
  - name: prtr
    repository:
      owner: helloprtr
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/helloprtr/poly-prompt
    description: Translate prompts to English and copy them to the macOS clipboard.
    license: MIT
    directory: Formula
    test: |
      system "#{bin}/prtr", "version"
    install: |
      bin.install "prtr"
