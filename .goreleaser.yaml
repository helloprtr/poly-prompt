project_name: prtr

before:
  hooks:
    - go test ./...

builds:
  - id: prtr
    main: ./cmd/prtr
    binary: prtr
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: prtr
    builds:
      - prtr
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^Merge .*"
  groups:
    - title: Features
      regexp: "^.*?: (Add|Adopt|Create|Expand|Teach|Turn)\\b"
      order: 0
    - title: Improvements
      regexp: "^.*?: (Improve|Polish|Refine|Simplify|Stabilize|Update)\\b"
      order: 1
    - title: Fixes
      regexp: "^.*?: (Fix|Resolve)\\b"
      order: 2
    - title: Docs
      regexp: "^.*?: (Document|Docs|Write)\\b"
      order: 3
    - title: Other Changes
      order: 999

release:
  github:
    owner: helloprtr
    name: poly-prompt
  header: |
    ## prtr {{ .Tag }}

    Think in your language. Send the right prompt to the right AI app.

    ### What's Changed
  footer: |

    ### Install / Update

    - macOS: `brew tap helloprtr/homebrew-tap && brew install prtr`
    - Linux / Windows: download the archive for your platform from the GitHub Releases page
    - Full installation guide: https://github.com/helloprtr/poly-prompt/blob/{{ .Tag }}/INSTALLATION.md

    For longer product-facing release notes, see `CHANGELOG.md` in this repository.

brews:
  - name: prtr
    repository:
      owner: helloprtr
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/helloprtr/poly-prompt
    description: Think in your language and send the right prompt to the right AI app.
    license: MIT
    directory: Formula
    test: |
      system "#{bin}/prtr", "version"
    install: |
      bin.install "prtr"
